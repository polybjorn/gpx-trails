<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trails</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/@raruto/leaflet-elevation@2.5.2/dist/leaflet-elevation.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #1e2228;
      --surface:      #252a31;
      --surface2:     #2a2e35;
      --border:       #363b44;
      --border-hover: #4a5060;
      --text:         #dde1e7;
      --muted:        #888;
      --accent:       #6aaeee;
      --red:          #ff5f57;
      --yellow:       #ffbd2e;
      --green:        #28ca41;
      --radius:       6px;

      --completed:        #28ca41;
      --planned:          #ff5f57;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-weight: 300;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { opacity: 0.8; }

    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 50px;
    }

    .nav-title {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.05em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex-shrink: 1;
    }

    .nav-route-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.75rem;
      color: var(--muted);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .nav-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .nav-group + .nav-group {
      margin-left: 0.5rem;
      padding-left: 1.25rem;
      border-left: 1px solid var(--border);
    }

    .nav-route-info .nav-stat {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .nav-route-info .nav-stat .label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .nav-route-info .nav-stat .value {
      font-weight: 300;
      color: var(--text);
    }

    .nav-route-info .nav-stat a {
      color: var(--accent);
      text-decoration: none;
    }

    .nav-route-info .nav-stat a:hover { text-decoration: underline; }
    #nav-stats-dynamic { margin-left: auto; }

    #app {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      height: calc(100vh - 50px);
      overflow-y: overlay;
      padding: 2rem 1.5rem 2rem;
      box-sizing: border-box;
    }
    #app:has(.detail-layout) {
      overflow: hidden;
      padding: 0;
      max-width: none;
    }
    #app:has(#overview-map) {
      overflow: hidden;
      padding: 0.5rem 1.5rem;
      position: relative;
    }

    .region-group {
      margin-bottom: 2rem;
    }

    .region-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 0.5rem;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .region-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .route-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.5rem;
    }

    .route-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .route-card:hover {
      border-color: var(--border-hover);
    }

    .route-card .name {
      font-size: 0.85rem;
      font-weight: 300;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .route-card .badges {
      display: flex;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .badge {
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.15rem 0.35rem;
      border-radius: 3px;
      background: var(--surface2);
      color: var(--muted);
    }

    .badge.ele { color: var(--green); }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.completed { background: var(--completed); }
    .status-dot.planned { background: var(--planned); }

    .route-count {
      font-size: 0.65rem;
      color: var(--muted);
    }

    /* Detail view */
    .detail-layout {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 0.5rem 1.5rem 0.5rem;
      max-width: 1400px;
      margin: 0 auto;
      box-sizing: border-box;
    }

    #map {
      width: 100%;
      flex: 1;
      min-height: 200px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .elevation-wrap {
      margin-top: 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      flex-shrink: 0;
    }
    .elevation-wrap .elevation-detached { margin: 0 !important; padding: 0 !important; border: none !important; box-shadow: none !important; }
    .elevation-wrap .elevation-detached svg { width: 100% !important; display: block; margin-top: -8px; margin-bottom: -20px; }
    .elevation-wrap .elevation-detached .elevation-summary { display: none !important; }
    .elevation-wrap .elevation-detached .elevation-toggle-icon { display: none !important; }

    .mobile-stats {
      display: none;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    .mobile-stats .stats-meta { display: flex; gap: 0.5rem; align-items: center; }
    .mobile-stats .stats-data { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .mobile-stats .stat { display: flex; align-items: center; gap: 0.25rem; white-space: nowrap; }
    .mobile-stats .stat .label { font-size: 0.55rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    .mobile-stats .stat .value { color: var(--text); font-weight: 300; }

    .no-elevation-notice {
      font-size: 0.75rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 0.75rem;
    }

    /* Multi-track */
    #track-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }

    .track-legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .track-legend-color {
      width: 16px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .track-legend-item .track-name { color: var(--text); font-weight: 400; }
    .track-legend-item .track-stat { font-size: 0.6rem; }

    #multi-elevation-container {
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      flex-shrink: 0;
      overflow-y: auto;
      max-height: 50vh;
    }

    .elevation-track-panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
    }

    .elevation-track-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.3rem 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      user-select: none;
    }

    .elevation-track-label::after {
      content: '';
      margin-left: auto;
      border: 4px solid transparent;
      border-top: 5px solid var(--muted);
      transition: transform 0.15s;
    }

    .elevation-track-panel.collapsed .elevation-track-label::after {
      transform: rotate(-90deg);
    }

    .elevation-track-panel .elevation-track-chart { transition: max-height 0.2s ease; overflow: hidden; }
    .elevation-track-panel.collapsed .elevation-track-chart { max-height: 0 !important; }

    .elevation-track-label .color-dot {
      width: 8px;
      height: 3px;
      border-radius: 2px;
    }

    .elevation-track-panel .elevation-detached { margin: 0 !important; padding: 0 !important; border: none !important; box-shadow: none !important; }
    .elevation-track-panel .elevation-detached svg { width: 100% !important; display: block; margin-top: -8px; margin-bottom: -20px; }
    .elevation-track-panel .elevation-detached .elevation-summary { display: none !important; }
    .elevation-track-panel .elevation-detached .elevation-toggle-icon { display: none !important; }
    .elevation-track-panel .elevation-control .area { fill: var(--track-color, var(--accent)); fill-opacity: 0.35; stroke: var(--track-color, var(--accent)); }

    /* Overview map */
    #overview-map {
      width: 100%;
      height: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-sizing: border-box;
    }

    .overview-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      z-index: 1000;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
    }

    .legend-line {
      width: 20px;
      height: 3px;
      border-radius: 2px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Leaflet overrides for dark theme */
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }

    .leaflet-control-zoom a:hover {
      background: var(--surface2) !important;
    }

    .leaflet-control-attribution {
      background: rgba(30, 34, 40, 0.85) !important;
      color: var(--muted) !important;
      font-size: 0.6rem !important;
    }

    .leaflet-control-attribution a { color: var(--accent) !important; }

    /* Elevation control overrides */
    .elevation-control .background { fill: var(--surface); }
    .elevation-control .area { fill: var(--accent); fill-opacity: 0.35; stroke: var(--accent); }
    .elevation-control .axis text { fill: var(--muted); font-size: 10px; }
    .elevation-control .axis line, .elevation-control .axis path { stroke: var(--border); }
    .elevation-control .mouse-focus-line { stroke: var(--text); }
    .elevation-detached:not(:hover) .mouse-focus-line,
    .elevation-detached:not(:hover) .mouse-focus-label { display: none; }
    .leaflet-elevation-pane .elevation-summary { background: var(--surface) !important; color: var(--text) !important; }
    .elevation-control .close-button, .elevation-control .elevation-toggle-icon, .elevation-detached .leaflet-close { display: none !important; }

    /* Leaflet popup */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-radius: var(--radius) !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { font-size: 0.8rem; font-weight: 300; }
    .leaflet-popup-content a { color: var(--accent); }
    .leaflet-interactive { filter: drop-shadow(0 0 3px rgba(0,0,0,0.5)); }
    .leaflet-control-layers { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: var(--radius) !important; color: var(--text) !important; }
    .leaflet-control-layers label { color: var(--text); }
    .leaflet-control-layers-separator { border-color: var(--border) !important; }
    .marker-start, .marker-end { background: none !important; border: none !important; }

    @media (max-width: 900px) {
      #app { padding: 1rem 1rem 3rem; }
      .route-grid { grid-template-columns: 1fr; }
      .detail-layout { padding: 0.5rem 0.75rem 0.5rem; }
      nav { padding: 0.6rem 1rem; }
      .nav-route-info { gap: 0.4rem; flex-wrap: wrap; }
      .nav-group { gap: 0.4rem; }
      .nav-group + .nav-group { padding-left: 0.4rem; }
      .nav-route-info .nav-stat .label { font-size: 0.5rem; }
      .nav-route-meta { display: none; }
      #nav-stats-dynamic { display: none; }
      .mobile-stats { display: flex; }
      #track-legend { gap: 0.4rem; padding: 0.4rem 0.5rem; }
      .track-legend-item .track-stat { display: none; }
      #multi-elevation-container { max-height: 40vh; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease both; }
  </style>
</head>
<body>
  <nav>
    <span class="nav-title"><a href="#/" style="color:var(--text);text-decoration:none" id="nav-home"><span id="nav-back" style="display:none;margin-right:0.4rem;opacity:0.5">&larr;</span>Trails</a><span id="nav-route-name"></span></span>
    <div class="nav-route-info" id="nav-route-info"></div>
  </nav>
  <div id="app"><div class="loading">Loading routes...</div></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/2.1.2/gpx.min.js"></script>
  <script src="https://unpkg.com/@raruto/leaflet-elevation@2.5.2/dist/leaflet-elevation.js"></script>
  <script>
    const ROUTE_COLOR = '#6aaeee';
    const TRACK_COLORS = ['#6aaeee', '#c792ea', '#ffbd2e', '#89ddff', '#f78c6c', '#c3e88d', '#ff5370', '#82b1ff'];

    const state = {
      manifest: null,
      gpxCache: {},
      currentMap: null,
      currentElevation: null,
    };

    function cleanupMap() {
      if (state.currentElevation) {
        const controls = Array.isArray(state.currentElevation) ? state.currentElevation : [state.currentElevation];
        for (const ctrl of controls) { try { ctrl.remove(); } catch (e) {} }
        state.currentElevation = null;
      }
      if (state.currentMap) {
        state.currentMap.remove();
        state.currentMap = null;
      }
    }

    function clearNavInfo() {
      document.getElementById('nav-route-info').innerHTML = '';
    }

    function formatDistance(m) {
      return m >= 1000 ? (m / 1000).toFixed(1) + ' km' : Math.round(m) + ' m';
    }

    function formatElevation(m) {
      return Math.round(m) + ' m';
    }

    function parseGpxTracks(xmlText) {
      const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
      const ns = 'http://www.topografix.com/GPX/1/1';
      let tracks = doc.getElementsByTagNameNS(ns, 'trk');
      if (tracks.length === 0) tracks = doc.getElementsByTagName('trk');
      const result = [];
      for (let i = 0; i < tracks.length; i++) {
        const trk = tracks[i];
        const nameEl = trk.getElementsByTagNameNS(ns, 'name')[0] || trk.getElementsByTagName('name')[0];
        const name = nameEl ? nameEl.textContent : 'Track ' + (i + 1);
        const points = [];
        let trkpts = trk.getElementsByTagNameNS(ns, 'trkpt');
        if (trkpts.length === 0) trkpts = trk.getElementsByTagName('trkpt');
        for (let j = 0; j < trkpts.length; j++) {
          const pt = trkpts[j];
          const lat = parseFloat(pt.getAttribute('lat'));
          const lon = parseFloat(pt.getAttribute('lon'));
          const eleEl = pt.getElementsByTagNameNS(ns, 'ele')[0] || pt.getElementsByTagName('ele')[0];
          const ele = eleEl ? parseFloat(eleEl.textContent) : null;
          points.push({ lat, lon, ele });
        }
        result.push({ name, points });
      }
      return result;
    }

    function computeTrackStats(points) {
      let distance = 0, gain = 0, loss = 0, maxEle = -Infinity;
      for (let i = 1; i < points.length; i++) {
        const prev = points[i - 1], curr = points[i];
        distance += L.latLng(prev.lat, prev.lon).distanceTo(L.latLng(curr.lat, curr.lon));
        if (curr.ele !== null && prev.ele !== null) {
          const diff = curr.ele - prev.ele;
          if (diff > 0) gain += diff; else loss -= diff;
          if (curr.ele > maxEle) maxEle = curr.ele;
        }
      }
      if (points.length > 0 && points[0].ele !== null && points[0].ele > maxEle) maxEle = points[0].ele;
      return { distance, gain, loss, maxEle };
    }

    function trackToGeoJSON(track) {
      return {
        type: 'Feature',
        geometry: {
          type: 'LineString',
          coordinates: track.points.map(p => [p.lon, p.lat, p.ele]),
        },
        properties: {},
      };
    }

    function createTileLayers() {
      return {
        'OpenTopoMap': L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
          maxZoom: 17, subdomains: 'abc',
          attribution: 'Map: <a href="https://opentopomap.org">OpenTopoMap</a> · Data: <a href="https://openstreetmap.org">OSM</a>',
        }),
        'CyclOSM': L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', {
          maxZoom: 20, subdomains: 'abc',
          attribution: '<a href="https://github.com/cyclosm/cyclosm-cartocss-style/releases">CyclOSM</a> · <a href="https://openstreetmap.org">OSM</a>',
        }),
        'Satellite': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
          maxZoom: 19,
          attribution: 'Tiles: <a href="https://www.esri.com">Esri</a>',
        }),
        'Dark': L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          maxZoom: 20, subdomains: 'abcd',
          attribution: '<a href="https://carto.com/attributions">CARTO</a> · <a href="https://openstreetmap.org">OSM</a>',
        }),
        'OpenStreetMap': L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '<a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
        }),
      };
    }

    function addTileLayersToMap(map) {
      const layers = createTileLayers();
      layers['Satellite'].addTo(map);
      L.control.layers(layers, null, { position: 'topright' }).addTo(map);
    }

    function setNavRouteName(name) {
      var el = document.getElementById('nav-route-name');
      el.textContent = name ? ' / ' + name : '';
      var back = document.getElementById('nav-back');
      if (back) back.style.display = name ? 'inline' : 'none';
    }

    // --- Index view ---
    function renderIndex() {
      setNavRouteName('');
      cleanupMap();
      const app = document.getElementById('app');
      if (!state.manifest) { clearNavInfo(); app.innerHTML = '<div class="loading">Loading routes...</div>'; return; }

      const regions = state.manifest.regions;
      const allRoutes = regions.flatMap(r => r.routes);
      const total = allRoutes.length;
      const completed = allRoutes.filter(r => r.completed).length;

      document.getElementById('nav-route-info').innerHTML =
        '<div class="nav-group" style="position:absolute;left:50%;transform:translateX(-50%)">' +
        '<div class="nav-stat"><span class="value">' + completed + '/' + total + ' completed</span></div>' +
        '<div class="nav-stat"><span class="value">' + regions.length + ' regions</span></div>' +
        '</div>' +
        '<div class="nav-group">' +
        '<div class="nav-stat"><span class="value"><a href="#/overview" style="display:flex;align-items:center;gap:0.3rem"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>Map</a></span></div>' +
        '</div>';

      let html = '';

      for (const region of regions) {
        const regionCompleted = region.routes.filter(r => r.completed).length;
        const ratio = region.routes.length > 0 ? regionCompleted / region.routes.length : 0;
        const dotColor = ratio === 1 ? '#00e05a' : ratio === 0 ? '#ff6b6b' : '#ffbd2e';
        html += '<div class="region-group fade-in">';
        html += '<div class="region-label">';
        html += '<span class="region-dot" style="background:' + dotColor + '"></span>';
        html += region.name;
        html += '<span class="route-count">(' + regionCompleted + '/' + region.routes.length + ')</span>';
        html += '</div>';
        html += '<div class="route-grid">';
        for (const route of region.routes) {
          const href = '#/route/' + encodeURIComponent(route.key);
          const statusClass = route.completed ? 'completed' : 'planned';
          html += '<div class="route-card" onclick="location.hash=\'' + href.replace(/'/g, "\\'") + '\'">';
          html += '<span class="status-dot ' + statusClass + '"></span>';
          html += '<span class="name">' + escapeHtml(route.name) + '</span>';
          html += '</div>';
        }
        html += '</div></div>';
      }
      app.innerHTML = html;
    }

    // --- Overview view ---
    function renderOverview() {
      setNavRouteName('');
      clearNavInfo();
      cleanupMap();
      const app = document.getElementById('app');
      if (!state.manifest) { app.innerHTML = '<div class="loading">Loading routes...</div>'; return; }

      app.innerHTML = '<div id="overview-map"></div><div class="overview-legend" id="legend"></div>';

      const map = L.map('overview-map', { zoomControl: true }).setView([59.5, 6.5], 7);
      state.currentMap = map;
      addTileLayersToMap(map);

      const allBounds = L.latLngBounds();
      const allRoutes = state.manifest.regions.flatMap(r => r.routes);
      const completedCount = allRoutes.filter(r => r.completed).length;
      const plannedCount = allRoutes.length - completedCount;

      let legendHtml = '';
      legendHtml += '<div class="legend-item"><span class="legend-line" style="background:#00e05a"></span>Completed (' + completedCount + ')</div>';
      legendHtml += '<div class="legend-item"><span class="legend-line" style="background:#ff6b6b"></span>Planned (' + plannedCount + ')</div>';

      for (const region of state.manifest.regions) {
        for (const route of region.routes) {
          const color = route.completed ? '#00e05a' : '#ff6b6b';
          const gpxUrl = 'gpx/' + route.file;
          new L.GPX(gpxUrl, {
            async: true,
            polyline_options: { color: color, opacity: 0.9, weight: 4 },
            markers: { startIcon: null, endIcon: null, wptIcons: { '': null }, wptTypeIcons: { '': null } },
          }).on('loaded', function(e) {
            const bounds = e.target.getBounds();
            if (bounds.isValid()) {
              allBounds.extend(bounds);
              map.fitBounds(allBounds, { padding: [30, 30] });
            }
          }).on('click', function() {
            location.hash = '#/route/' + encodeURIComponent(route.key);
          }).bindPopup('<a href="#/route/' + encodeURIComponent(route.key) + '">' + escapeHtml(route.name) + '</a> <span style="color:' + color + '">' + (route.completed ? '(completed)' : '(planned)') + '</span>').addTo(map);
        }
      }

      document.getElementById('legend').innerHTML = legendHtml;
    }

    // --- Detail view ---
    function renderRoute(hash) {
      cleanupMap();
      const app = document.getElementById('app');
      if (!state.manifest) { app.innerHTML = '<div class="loading">Loading routes...</div>'; return; }

      const routeKey = decodeURIComponent(hash.replace('#/route/', ''));
      let route = null, regionName = '';
      for (const region of state.manifest.regions) {
        for (const r of region.routes) {
          if (r.key === routeKey) { route = r; regionName = region.name; break; }
        }
        if (route) break;
      }

      if (!route) { app.innerHTML = '<div class="loading">Route not found</div>'; return; }

      setNavRouteName(route.name);

      const color = ROUTE_COLOR;
      const statusLabel = route.completed ? 'Completed' : 'Planned';

      // Populate nav bar with route info
      let navHtml = '';
      navHtml += '<div class="nav-group nav-route-meta">';
      navHtml += '<div class="nav-stat"><span class="value" style="color:' + (route.completed ? 'var(--completed)' : 'var(--planned)') + '">' + statusLabel + '</span></div>';
      navHtml += '<div class="nav-stat"><span class="value">' + escapeHtml(regionName) + '</span></div>';
      navHtml += '</div>';
      navHtml += '<div class="nav-group" id="nav-stats-dynamic"></div>';
      if (route.source) {
        navHtml += '<div class="nav-group">';
        navHtml += '<div class="nav-stat"><span class="value"><a href="' + escapeHtml(route.source) + '" target="_blank" rel="noopener">Source &#x2197;</a></span></div>';
        navHtml += '</div>';
      }
      document.getElementById('nav-route-info').innerHTML = navHtml;

      const isMultiTrack = route.trackCount && route.trackCount > 1;

      let html = '<div class="detail-layout">';
      html += '<div id="map"></div>';
      html += '<div class="mobile-stats" id="mobile-stats"></div>';
      if (isMultiTrack) {
        html += '<div id="track-legend"></div>';
        html += '<div id="multi-elevation-container"></div>';
      } else {
        if (route.hasElevation) html += '<div class="elevation-wrap" id="elevation-container"></div>';
        if (!route.hasElevation) html += '<div class="no-elevation-notice">No elevation data available for this route</div>';
      }
      html += '</div>';
      app.innerHTML = html;

      const map = L.map('map', { zoomControl: true }).setView([59.5, 6.5], 10);
      state.currentMap = map;
      addTileLayersToMap(map);

      // Overlay planned reference track as dashed line if both exist
      if (route.plannedFile && route.completed) {
        new L.GPX('gpx/' + route.plannedFile, {
          async: true,
          polyline_options: { color: ROUTE_COLOR, opacity: 0.35, weight: 4, dashArray: '8 6' },
          markers: { startIcon: null, endIcon: null, wptIcons: { '': null }, wptTypeIcons: { '': null } },
        }).addTo(map);
      }

      if (isMultiTrack) {
        renderMultiTrack(map, route);
      } else {
        renderSingleTrack(map, route, color);
      }
    }

    function renderSingleTrack(map, route, color) {
      let elevationControl = null;
      if (route.hasElevation) {
        elevationControl = L.control.elevation({
          theme: 'custom-theme',
          detached: true,
          elevationDiv: '#elevation-container',
          height: 200,
          slope: false,
          speed: false,
          acceleration: false,
          time: false,
          legend: false,
          summary: false,
          ruler: false,
          downloadLink: false,
          almostOver: false,
          distanceMarkers: false,
          polyline: { color: color, opacity: 0.9, weight: 5 },
        }).addTo(map);
        state.currentElevation = elevationControl;
      }

      const gpxUrl = 'gpx/' + route.file;
      new L.GPX(gpxUrl, {
        async: true,
        polyline_options: { color: color, opacity: 0.9, weight: 5 },
        markers: { startIcon: null, endIcon: null, wptIcons: { '': null }, wptTypeIcons: { '': null } },
      }).on('loaded', function(e) {
        const gpx = e.target;
        const bounds = gpx.getBounds();
        if (bounds.isValid()) map.fitBounds(bounds, { padding: [40, 40] });

        // Add start/end markers
        const layers = [];
        gpx.eachLayer(function(layer) {
          if (layer.getLatLngs) layers.push(layer);
        });
        if (layers.length > 0) {
          const latlngs = layers[0].getLatLngs();
          const flat = Array.isArray(latlngs[0]) ? latlngs.flat() : latlngs;
          if (flat.length > 1) {
            addStartEndMarkers(map, flat[0], flat[flat.length - 1]);
          }
        }

        const dist = gpx.get_distance();
        var stats = { dist: dist, status: route.completed ? 'Completed' : 'Planned', completed: route.completed, region: route.key.split('/')[0] };
        if (route.hasElevation) {
          stats.gain = gpx.get_elevation_gain();
          stats.loss = gpx.get_elevation_loss();
          stats.max = gpx.get_elevation_max();
        }
        populateStats(stats);
      }).on('addline', function(e) {
        if (elevationControl) elevationControl.addData(e.line);
      }).addTo(map);
    }

    function populateStats(s) {
      var items = [{ l: 'Dist', v: formatDistance(s.dist) }];
      if (s.tracks) items.unshift({ l: 'Tracks', v: s.tracks });
      if (s.gain !== undefined) {
        var hours = (s.dist / 1000) / 5 + s.gain / 600;
        var h = Math.floor(hours), m = Math.round((hours - h) * 60);
        items.push({ l: 'Gain', v: '+' + formatElevation(s.gain) });
        items.push({ l: 'Loss', v: '-' + formatElevation(s.loss) });
        items.push({ l: 'Peak', v: formatElevation(s.max) });
        items.push({ l: 'Est.', v: h > 0 ? h + 'h ' + m + 'min' : m + 'min' });
      }
      var navEl = document.getElementById('nav-stats-dynamic');
      if (navEl) navEl.innerHTML = items.map(function(i) { return '<div class="nav-stat"><span class="label">' + i.l + '</span><span class="value">' + i.v + '</span></div>'; }).join('');
      var mobEl = document.getElementById('mobile-stats');
      if (mobEl) {
        var metaHtml = '';
        if (s.status) {
          var sc = s.completed ? 'var(--completed)' : 'var(--planned)';
          metaHtml += '<div class="stat"><span class="value" style="color:' + sc + '">' + s.status + '</span></div>';
          if (s.region) metaHtml += '<div class="stat"><span class="value">' + s.region + '</span></div>';
        }
        var dataHtml = items.map(function(i) { return '<div class="stat"><span class="label">' + i.l + '</span><span class="value">' + i.v + '</span></div>'; }).join('');
        mobEl.innerHTML = '<div class="stats-meta">' + metaHtml + '</div><div class="stats-data">' + dataHtml + '</div>';
      }
    }

    function addStartEndMarkers(map, startLatLng, endLatLng) {
      var startIcon = L.divIcon({ className: 'marker-start', html: '<svg viewBox="0 0 16 16" width="16" height="16"><circle cx="8" cy="8" r="6" fill="#00e05a" stroke="#fff" stroke-width="2"/></svg>', iconSize: [16, 16], iconAnchor: [8, 8] });
      var endIcon = L.divIcon({ className: 'marker-end', html: '<svg viewBox="0 0 32 32" width="32" height="32"><rect x="4" y="2" width="2" height="28" rx="1" fill="#fff" stroke="#2d333b" stroke-width="0.5"/><path d="M6 3h12c1 0 1.5.5 1 1.5L17 8l2 3.5c.5 1 0 1.5-1 1.5H6V3z" fill="#fff" stroke="#2d333b" stroke-width="0.5"/><rect x="7" y="4" width="4.5" height="4" fill="#2d333b"/><rect x="11.5" y="4" width="4.5" height="4" fill="#fff"/><rect x="7" y="8" width="4.5" height="4" fill="#fff"/><rect x="11.5" y="8" width="4.5" height="4" fill="#2d333b"/></svg>', iconSize: [32, 32], iconAnchor: [5, 30] });
      L.marker(startLatLng, { icon: startIcon }).bindPopup('Start').addTo(map);
      L.marker(endLatLng, { icon: endIcon }).bindPopup('End').addTo(map);
    }

    function renderMultiTrack(map, route) {
      fetch('gpx/' + route.file)
        .then(function(r) { return r.text(); })
        .then(function(xmlText) {
          const tracks = parseGpxTracks(xmlText);
          if (tracks.length === 0) return;

          const elevHeight = 200;
          const elevControls = [];
          const allStats = [];
          const bounds = L.latLngBounds();

          // Build elevation panels HTML
          const container = document.getElementById('multi-elevation-container');
          if (container) {
            let panelsHtml = '';
            for (let i = 0; i < tracks.length; i++) {
              const tc = TRACK_COLORS[i % TRACK_COLORS.length];
              const collapsed = i > 0 ? ' collapsed' : '';
              panelsHtml += '<div class="elevation-track-panel' + collapsed + '" style="--track-color:' + tc + '">';
              panelsHtml += '<div class="elevation-track-label" onclick="var p=this.parentElement;if(p.classList.contains(\'collapsed\')){p.parentElement.querySelectorAll(\'.elevation-track-panel:not(.collapsed)\').forEach(function(s){s.classList.add(\'collapsed\')});p.classList.remove(\'collapsed\')}else{p.classList.add(\'collapsed\')}"><span class="color-dot" style="background:' + tc + '"></span>' + escapeHtml(tracks[i].name) + '</div>';
              panelsHtml += '<div class="elevation-track-chart" id="elevation-track-' + i + '"></div>';
              panelsHtml += '</div>';
            }
            container.innerHTML = panelsHtml;
          }

          // Create elevation controls and polylines per track
          for (let i = 0; i < tracks.length; i++) {
            const track = tracks[i];
            const tc = TRACK_COLORS[i % TRACK_COLORS.length];
            const stats = computeTrackStats(track.points);
            allStats.push(stats);

            // Extend bounds
            for (const p of track.points) {
              bounds.extend([p.lat, p.lon]);
            }

            // Always draw polyline manually
            const latlngs = track.points.map(function(p) { return [p.lat, p.lon]; });
            L.polyline(latlngs, { color: tc, opacity: 0.9, weight: 5 }).addTo(map);

            const hasEle = track.points.some(function(p) { return p.ele !== null; });
            if (hasEle && container) {
              const ctrl = L.control.elevation({
                theme: 'custom-theme',
                detached: true,
                elevationDiv: '#elevation-track-' + i,
                height: elevHeight,
                slope: false,
                speed: false,
                acceleration: false,
                time: false,
                legend: false,
                summary: false,
                ruler: false,
                downloadLink: false,
                almostOver: false,
                distanceMarkers: false,
                polyline: false,
              }).addTo(map);
              ctrl.addData(trackToGeoJSON(track));
              elevControls.push(ctrl);
            }
          }

          state.currentElevation = elevControls;

          // Fit map
          if (bounds.isValid()) map.fitBounds(bounds, { padding: [40, 40] });

          // Start/end markers
          const firstTrack = tracks[0];
          const lastTrack = tracks[tracks.length - 1];
          if (firstTrack.points.length > 0 && lastTrack.points.length > 0) {
            const sp = firstTrack.points[0];
            const ep = lastTrack.points[lastTrack.points.length - 1];
            addStartEndMarkers(map, L.latLng(sp.lat, sp.lon), L.latLng(ep.lat, ep.lon));
          }

          // Track legend
          const legendEl = document.getElementById('track-legend');
          if (legendEl) {
            let legendHtml = '';
            for (let i = 0; i < tracks.length; i++) {
              const tc = TRACK_COLORS[i % TRACK_COLORS.length];
              const s = allStats[i];
              legendHtml += '<div class="track-legend-item">';
              legendHtml += '<span class="track-legend-color" style="background:' + tc + '"></span>';
              legendHtml += '<span class="track-name">' + escapeHtml(tracks[i].name) + '</span>';
              legendHtml += '<span class="track-stat">' + formatDistance(s.distance) + '</span>';
              if (s.gain > 0) legendHtml += '<span class="track-stat">+' + formatElevation(s.gain) + '</span>';
              legendHtml += '</div>';
            }
            legendEl.innerHTML = legendHtml;
          }

          const totals = allStats.reduce(function(acc, s) {
            return { distance: acc.distance + s.distance, gain: acc.gain + s.gain, loss: acc.loss + s.loss, maxEle: Math.max(acc.maxEle, s.maxEle) };
          }, { distance: 0, gain: 0, loss: 0, maxEle: -Infinity });
          var ps = { dist: totals.distance, tracks: tracks.length, status: route.completed ? 'Completed' : 'Planned', completed: route.completed, region: route.key.split('/')[0] };
          if (totals.gain > 0) { ps.gain = totals.gain; ps.loss = totals.loss; ps.max = totals.maxEle; }
          populateStats(ps);
        });
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // --- Router ---
    function router() {
      const hash = location.hash || '#/';
      if (hash === '#/' || hash === '#') renderIndex();
      else if (hash === '#/overview') renderOverview();
      else if (hash.startsWith('#/route/')) renderRoute(hash);
    }

    window.addEventListener('hashchange', router);

    // --- Init ---
    fetch('routes.json')
      .then(r => r.json())
      .then(data => {
        data.regions.sort((a, b) => a.name.localeCompare(b.name));
        for (const region of data.regions) {
          region.routes.sort((a, b) => a.name.localeCompare(b.name));
        }
        state.manifest = data;
        router();
      })
      .catch(() => {
        document.getElementById('app').innerHTML =
          '<div class="loading">Failed to load routes.json. Run gpx-manifest.sh to generate it.</div>';
      });
  </script>
</body>
</html>
